<!DOCTYPE html>
<html>

<head>
    <title>Famly Downloader</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>

<body>

    <h1>Famly Photo Downloader</h1>

    <div class="controls-grid">
        <!-- Row 1: folder picker -->
        <div class="left">
            <button id="folderBtn">Choose Folder</button>
        </div>
        <div class="right">
            <p id="folderPath">No folder selected</p>
        </div>

        <!-- Row 2: date range -->
        <div class="left" style="align-self:center;">
            <p style="margin:0">Date Range (optional):</p>
        </div>
        <div class="right">
            <div class="dr-row">
                <label class="dr-label" for="startDate">Start date:</label>
                <input type="date" id="startDate" />
            </div>

            <div class="dr-row">
                <label class="dr-label" for="endDate">End date:</label>
                <input type="date" id="endDate" />
            </div>
        </div>

        <!-- Row 3: action buttons -->
        <div class="left">
            <button id="startBtn">Download Photos</button>
        </div>
        <div class="right actions">
            <button id="cancelBtn">Cancel</button>
        </div>
    </div>

    <small>A browser window will open up and you´ll need to login. </small> </br>
    <small>Then navigate to your child's profile and the download will run automatically.</small>

    <progress id="bar" value="0" max="100"></progress>

    <div id="log"></div>

    <script src="renderer.js"></script>
</body>

</html>
