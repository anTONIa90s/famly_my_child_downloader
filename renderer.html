<!DOCTYPE html>
<html>

<head>
    <title>Famly Downloader</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        button {
            margin: 10px 0;
            padding: 10px;
        }

        #log {
            margin-top: 20px;
            height: 300px;
            overflow: auto;
            background: #111;
            color: #0f0;
            padding: 10px;
        }

        #bar {
            width: 100%;
            height: 20px;
        }
    </style>
</head>

<body>

    <h1>Famly Photo Downloader</h1>

    <button id="folderBtn">Choose Folder</button>
    <p id="folderPath">No folder selected</p>

    <button id="startBtn">Download Photos</button>
    <button id="cancelBtn">Cancel</button>

    <progress id="bar" value="0" max="100"></progress>

    <div id="log"></div>

    <script src="renderer.js"></script>
</body>

</html>
